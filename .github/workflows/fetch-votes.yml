name: Refresh vote data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-votes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Fetch latest votes
        run: npm run fetch:votes

      - name: Commit updated data if changed
        id: commit_data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/data/voteDetails.json

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update vote data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Note when vote data is unchanged
        if: steps.commit_data.outputs.changed != 'true'
        run: echo "Vote data is already up to date."
